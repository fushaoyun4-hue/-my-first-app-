name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Build Debug APK'
        required: false
        default: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper/dists
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Download ONNX Models
        run: |
          mkdir -p app/src/main/assets/models
          pip install huggingface-hub
          # LaMa 修复模型 (Carve/LaMa-ONNX, opset 17, 512x512, ~208MB)
          huggingface-cli download Carve/LaMa-ONNX lama_fp32.onnx \
            --local-dir app/src/main/assets/models \
            --local-dir-use-symlinks False \
            --resume-download
          mv app/src/main/assets/models/lama_fp32.onnx app/src/main/assets/models/lama-inpaint.onnx
          # 注意：水印检测使用传统 CV 方法（Sobel 边缘检测），无需 YOLOv8 模型

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon -Pandroid.disableResourceValidation=true

      - name: Build Release APK
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK (Debug)
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload APK (Release)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: app-release-v${{ github.ref_name }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Create Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/app-release.apk
          body: |
            ## 下载说明
            直接安装 `app-release.apk` 到手机即可使用。

            ## 首次运行
            1. 安装 APK 后打开 App
            2. 首次使用会下载 AI 模型（约 50~100MB）
            3. 允许存储权限，开始使用
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
