name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Download ONNX Models
        run: |
          mkdir -p app/src/main/assets/models
          pip install huggingface-hub
          # LaMa 修复模型 (Carve/LaMa-ONNX, opset 17, 512x512, ~208MB)
          huggingface-cli download Carve/LaMa-ONNX lama_fp32.onnx \
            --local-dir app/src/main/assets/models \
            --local-dir-use-symlinks False \
            --resume-download
          mv app/src/main/assets/models/lama_fp32.onnx app/src/main/assets/models/lama-inpaint.onnx || true
          # YOLOv8n ONNX (水印检测, ~6MB)
          curl -L -o app/src/main/assets/models/yolov8n.onnx \
            https://github.com/ultralytics/assets/releases/download/v8.2.0/yolov8n.onnx || true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --console=plain

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
          name: Debug APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
